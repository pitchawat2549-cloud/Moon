
<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.vn{background:#0a0612;border-radius:16px;min-height:480px;display:flex;flex-direction:column;font-family:'Crimson Pro',serif;overflow:hidden;position:relative;}
.vn-scene{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 2rem 1rem;position:relative;min-height:280px;}
.vn-bg{position:absolute;inset:0;opacity:0.18;background:radial-gradient(ellipse at 50% 30%, #4c1d95 0%, transparent 70%);}
.vn-particles{position:absolute;inset:0;pointer-events:none;}
.vn-art{font-size:64px;margin-bottom:1rem;filter:drop-shadow(0 0 18px #7c3aed88);transition:all 0.6s;}
.vn-location{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:#6d28d9;text-transform:uppercase;margin-bottom:0.75rem;}
.vn-textbox{background:rgba(10,6,18,0.92);border:1px solid rgba(109,40,217,0.4);border-radius:10px;padding:1.25rem 1.5rem;width:100%;max-width:520px;margin:0 auto;}
.vn-speaker{font-family:'Space Mono',monospace;font-size:11px;color:#a78bfa;letter-spacing:2px;margin-bottom:0.5rem;}
.vn-text{color:#e2d9f3;font-size:16px;line-height:1.75;min-height:48px;}
.vn-cursor{display:inline-block;width:8px;height:14px;background:#7c3aed;animation:blink 0.9s infinite;vertical-align:-2px;margin-left:2px;border-radius:1px;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.vn-choices{padding:0.75rem 1.5rem 1.5rem;display:flex;flex-direction:column;gap:8px;max-width:520px;margin:0 auto;width:100%;}
.vn-choice{background:rgba(109,40,217,0.12);border:1px solid rgba(139,92,246,0.3);border-radius:8px;padding:0.65rem 1rem;color:#c4b5fd;font-family:'Crimson Pro',serif;font-size:15px;cursor:pointer;text-align:left;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.vn-choice:hover{background:rgba(109,40,217,0.3);border-color:rgba(139,92,246,0.6);color:#ede9fe;}
.vn-choice-icon{font-size:13px;opacity:0.6;}
.vn-progress{display:flex;gap:4px;padding:0.75rem 1.5rem 0;justify-content:center;}
.vn-dot{width:6px;height:6px;border-radius:50%;background:rgba(109,40,217,0.3);}
.vn-dot.active{background:#7c3aed;}
.vn-dot.done{background:rgba(109,40,217,0.6);}
.celebrate{display:none;flex-direction:column;align-items:center;padding:2rem;}
.celebrate.show{display:flex;}
canvas#fc{position:absolute;top:0;left:0;pointer-events:none;border-radius:16px;}
.c-name{font-size:52px;font-weight:700;color:#ede9fe;font-family:'Crimson Pro',serif;text-shadow:0 0 40px #7c3aed99;margin:0.5rem 0;}
.c-msg{color:#c4b5fd;font-size:15px;line-height:1.8;text-align:center;max-width:380px;border:1px solid rgba(139,92,246,0.3);border-radius:10px;padding:1.25rem 1.5rem;margin:1rem 0;}
.c-tag{font-family:'Space Mono',monospace;font-size:10px;color:#6d28d9;letter-spacing:3px;}
.replay-btn{background:transparent;border:1px solid rgba(139,92,246,0.4);border-radius:8px;color:#a78bfa;font-family:'Space Mono',monospace;font-size:11px;padding:0.5rem 1.25rem;cursor:pointer;margin-top:0.5rem;letter-spacing:1px;}
.replay-btn:hover{background:rgba(109,40,217,0.2);}
.fade-in{animation:fadeIn 0.5s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>

<div class="vn" id="vn">
  <canvas id="fc" width="680" height="480"></canvas>
  <div class="vn-progress" id="prog"></div>
  <div class="vn-scene" id="scene">
    <div class="vn-bg"></div>
    <div class="vn-art" id="art">🕯️</div>
    <div class="vn-location" id="loc">??? — midnight</div>
    <div class="vn-textbox">
      <div class="vn-speaker" id="spk">SYSTEM</div>
      <div class="vn-text" id="txt"></div>
    </div>
  </div>
  <div class="vn-choices" id="choices"></div>
  <div class="celebrate" id="cel">
    <div class="c-tag">— case closed —</div>
    <div class="c-name">Happy Birthday, Moon.</div>
    <div class="c-msg">
      ความลึกลับทั้งหมดนี้มีคำตอบเดียว<br>
      คือวันนี้เป็นวันพิเศษของคุณ<br><br>
      รู้จักกันได้ไม่นาน แต่ก็รู้สึกได้ว่า<br>
      คุณเป็นคนที่น่าจดจำมากๆ คนนึง 🌙<br><br>
      ขอให้ปีนี้เต็มไปด้วยเรื่องราวดีๆ<br>
      และทุก stream ปังโดยไม่มีปริศนา
    </div>
    <div class="c-tag">— Moon — 2026 —</div>
    <button class="replay-btn" onclick="init()">▶ play again</button>
  </div>
</div>

<script>
const scenes=[
  {art:"🕯️",loc:"??? — midnight",spk:"SYSTEM",txt:"คุณตื่นขึ้นมาในห้องที่ไม่รู้จัก... มีเพียงแสงเทียนริบหรี่ และซองจดหมายที่มีชื่อว่า 'M O O N' วางอยู่บนโต๊ะ",choices:[{icon:"🔍",label:"เปิดซองจดหมาย",next:1},{icon:"👀",label:"มองไปรอบห้องก่อน",next:"1b"}]},
  {art:"📜",loc:"the sealed letter",spk:"LETTER",txt:"'ถ้าคุณอ่านสิ่งนี้อยู่ แสดงว่าคุณมาถูกทางแล้ว... ปริศนานี้มีคำตอบ แต่ต้องหาให้เจอเอง ไปที่หอนาฬิกา'",choices:[{icon:"🚪",label:"ออกไปหาหอนาฬิกา",next:2}]},
  {art:"🕰️",loc:"the clock tower — 11:58 PM",spk:"NARRATOR",txt:"หอนาฬิกาเก่าแก่ เข็มนาฬิกากำลังเคลื่อนใกล้เที่ยงคืน บนผนังมีรูปวาดของดวงจันทร์ และข้อความว่า 'เธอกำเนิดในคืนที่ดวงจันทร์สว่างที่สุด'",choices:[{icon:"🌙",label:"แตะรูปดวงจันทร์",next:3},{icon:"⏳",label:"รอจนนาฬิกาตี 12",next:"3b"}]},
  {art:"🗝️",loc:"hidden door",spk:"VOICE",txt:"ประตูลับเปิดออก... ข้างในมีแสงสีม่วงอ่อนๆ และเสียงกระซิบว่า 'คุณตามหาอะไรอยู่? หรือว่า... คุณถูกนำทางมาที่นี่เอง?'",choices:[{icon:"✨",label:"ก้าวเข้าไปข้างใน",next:4}]},
  {art:"🎂",loc:"the answer",spk:"???",txt:"ในห้องลับนั้น ไม่มีสมบัติ ไม่มีปริศนาอีกต่อไป มีเพียงแค่... เค้กวันเกิด และแสงเทียนที่กำลังรอให้ใครสักคนมาเป่า",choices:[{icon:"🎉",label:"เปิดเผยความจริง",next:"end"}]},
  {id:"1b",art:"🚪",loc:"the strange room",spk:"NARRATOR",txt:"ผนังห้องเต็มไปด้วยรูปถ่ายของดวงจันทร์ในคืนต่างๆ และปฏิทินที่วงวันหนึ่งไว้ด้วยปากกาสีแดง... วันที่ 12 มิถุนายน",choices:[{icon:"📜",label:"หยิบซองจดหมายบนโต๊ะ",next:1}]},
  {id:"3b",art:"🕰️",loc:"clock tower — midnight",spk:"CLOCK",txt:"ตี 12... นาฬิกาดังขึ้น 12 ครั้ง และเมื่อเสียงสุดท้ายดังขึ้น ประตูที่ซ่อนอยู่หลังรูปดวงจันทร์ก็เปิดออกเอง",choices:[{icon:"🚪",label:"ก้าวเข้าไป",next:3}]},
];

let cur=0;
const sceneMap={};
scenes.forEach((s,i)=>{ if(s.id) sceneMap[s.id]=s; else sceneMap[i]=s; });

function getProg(){
  const total=5;
  const steps=[0,"1b",1,2,3,"3b",4,"end"];
  return Math.min(Math.floor((steps.indexOf(String(cur))/steps.length)*total),total);
}

function renderProg(){
  const p=document.getElementById('prog');
  const done=getProg();
  p.innerHTML='';
  for(let i=0;i<5;i++){
    const d=document.createElement('div');
    d.className='vn-dot'+(i<done?' done':i===done?' active':'');
    p.appendChild(d);
  }
}

let typeTimer=null;
function typeText(el,text,cb){
  if(typeTimer) clearInterval(typeTimer);
  el.innerHTML='';
  let i=0;
  typeTimer=setInterval(()=>{
    if(i<text.length){el.innerHTML=text.slice(0,++i)+'<span class="vn-cursor"></span>';}
    else{el.innerHTML=text;clearInterval(typeTimer);typeTimer=null;if(cb)cb();}
  },22);
}

function render(){
  const s=sceneMap[cur]||sceneMap[0];
  const art=document.getElementById('art');
  const loc=document.getElementById('loc');
  const spk=document.getElementById('spk');
  const txt=document.getElementById('txt');
  const ch=document.getElementById('choices');
  const scene=document.getElementById('scene');

  scene.classList.remove('fade-in');
  void scene.offsetWidth;
  scene.classList.add('fade-in');

  art.textContent=s.art;
  loc.textContent=s.loc;
  spk.textContent=s.spk;
  ch.innerHTML='';
  renderProg();

  typeText(txt,s.txt,()=>{
    ch.innerHTML='';
    s.choices.forEach(c=>{
      const btn=document.createElement('button');
      btn.className='vn-choice fade-in';
      btn.innerHTML=`<span class="vn-choice-icon">${c.icon}</span>${c.label}`;
      btn.onclick=()=>go(c.next);
      ch.appendChild(btn);
    });
  });
}

function go(next){
  if(next==='end'){showEnd();return;}
  cur=next;
  render();
}

function showEnd(){
  document.getElementById('scene').style.display='none';
  document.getElementById('choices').style.display='none';
  document.getElementById('prog').style.display='none';
  const cel=document.getElementById('cel');
  cel.classList.add('show','fade-in');
  fireConfetti();
}

function fireConfetti(){
  const canvas=document.getElementById('fc');
  const ctx=canvas.getContext('2d');
  const cols=['#a78bfa','#7c3aed','#ede9fe','#c4b5fd','#f9a8d4','#fbbf24','#818cf8'];
  const ps=Array.from({length:140},()=>({
    x:Math.random()*680,y:-10-Math.random()*120,
    vx:(Math.random()-.5)*3,vy:2+Math.random()*3,
    col:cols[Math.floor(Math.random()*cols.length)],
    w:5+Math.random()*6,h:3+Math.random()*3,
    r:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.15
  }));
  let f=0;
  function draw(){
    ctx.clearRect(0,0,680,480);
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);
      ctx.fillStyle=p.col;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();
    });
    if(++f<200) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,680,480);
  }
  draw();
}

function init(){
  cur=0;
  document.getElementById('scene').style.display='';
  document.getElementById('choices').style.display='';
  document.getElementById('prog').style.display='';
  const cel=document.getElementById('cel');
  cel.classList.remove('show','fade-in');
  render();
}

init();
</script>
